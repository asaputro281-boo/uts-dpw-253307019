<svg viewBox="0 0 700 240" xmlns="http://www.w3.org/2000/svg" width="700" height="240">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f4c81"/>
      <stop offset="100%" stop-color="#00c9a7"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a72c4"/>
      <stop offset="100%" stop-color="#0f4c81"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00c9a7"/>
      <stop offset="100%" stop-color="#008f77"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="card4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="card5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="240" rx="14" fill="#f0f4f8"/>

  <!-- Title bar -->
  <rect width="700" height="48" rx="0" fill="url(#hdr)"/>
  <rect width="700" height="48" rx="14" fill="url(#hdr)"/>
  <rect y="20" width="700" height="28" fill="url(#hdr)"/>
  <text x="350" y="30" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="15" font-weight="700" fill="white">Alur Pendaftaran Peserta Didik Baru</text>

  <!-- Steps (5 cards) -->
  <!-- Step 1 -->
  <g filter="url(#shadow)">
    <rect x="30" y="68" width="108" height="120" rx="12" fill="url(#card1)"/>
  </g>
  <text x="84" y="100" text-anchor="middle" font-family="sans-serif" font-size="30">📝</text>
  <text x="84" y="124" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" font-weight="700" fill="white">Langkah 1</text>
  <text x="84" y="140" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" fill="rgba(255,255,255,.9)">Registrasi</text>
  <text x="84" y="154" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" fill="rgba(255,255,255,.9)">Akun Online</text>
  <text x="84" y="172" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="22" font-weight="900" fill="rgba(255,255,255,.2)">01</text>

  <!-- Arrow 1 -->
  <text x="153" y="135" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#0f4c81">➜</text>

  <!-- Step 2 -->
  <g filter="url(#shadow)">
    <rect x="168" y="68" width="108" height="120" rx="12" fill="url(#card2)"/>
  </g>
  <text x="222" y="100" text-anchor="middle" font-family="sans-serif" font-size="30">📋</text>
  <text x="222" y="124" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" font-weight="700" fill="white">Langkah 2</text>
  <text x="222" y="140" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" fill="rgba(255,255,255,.9)">Isi Formulir</text>
  <text x="222" y="154" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" fill="rgba(255,255,255,.9)">Pendaftaran</text>
  <text x="222" y="172" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="22" font-weight="900" fill="rgba(255,255,255,.2)">02</text>

  <!-- Arrow 2 -->
  <text x="291" y="135" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#0f4c81">➜</text>

  <!-- Step 3 -->
  <g filter="url(#shadow)">
    <rect x="306" y="68" width="108" height="120" rx="12" fill="url(#card3)"/>
  </g>
  <text x="360" y="100" text-anchor="middle" font-family="sans-serif" font-size="30">📤</text>
  <text x="360" y="124" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" font-weight="700" fill="white">Langkah 3</text>
  <text x="360" y="140" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" fill="rgba(255,255,255,.9)">Upload</text>
  <text x="360" y="154" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" fill="rgba(255,255,255,.9)">Dokumen</text>
  <text x="360" y="172" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="22" font-weight="900" fill="rgba(255,255,255,.2)">03</text>

  <!-- Arrow 3 -->
  <text x="429" y="135" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#0f4c81">➜</text>

  <!-- Step 4 -->
  <g filter="url(#shadow)">
    <rect x="444" y="68" width="108" height="120" rx="12" fill="url(#card4)"/>
  </g>
  <text x="498" y="100" text-anchor="middle" font-family="sans-serif" font-size="30">🔍</text>
  <text x="498" y="124" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" font-weight="700" fill="white">Langkah 4</text>
  <text x="498" y="140" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" fill="rgba(255,255,255,.9)">Verifikasi</text>
  <text x="498" y="154" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" fill="rgba(255,255,255,.9)">Berkas</text>
  <text x="498" y="172" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="22" font-weight="900" fill="rgba(255,255,255,.2)">04</text>

  <!-- Arrow 4 -->
  <text x="567" y="135" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#0f4c81">➜</text>

  <!-- Step 5 -->
  <g filter="url(#shadow)">
    <rect x="582" y="68" width="88" height="120" rx="12" fill="url(#card5)"/>
  </g>
  <text x="626" y="100" text-anchor="middle" font-family="sans-serif" font-size="30">🎉</text>
  <text x="626" y="124" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" font-weight="700" fill="white">Langkah 5</text>
  <text x="626" y="140" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" fill="rgba(255,255,255,.9)">Pengumuman</text>
  <text x="626" y="154" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" fill="rgba(255,255,255,.9)">&amp; Daftar Ulang</text>
  <text x="626" y="172" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="22" font-weight="900" fill="rgba(255,255,255,.2)">05</text>

  <!-- Bottom note -->
  <text x="350" y="214" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="10.5" fill="#64748b">Setiap tahap wajib diselesaikan sebelum melanjutkan ke tahap berikutnya</text>
</svg>
